<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2029"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="216" fill="url(#bg)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="210" fill="none" stroke="#2a2f3a" stroke-width="6"/>

  <!-- fanned cards (pitch colours), pivoting from a low centre point -->
  <g transform="translate(512 760)">
    <!-- card template: 300x430, bottom edge on the pivot -->
    <!-- red (pitch 1, left) -->
    <g transform="rotate(-21)">
      <rect x="-150" y="-430" width="300" height="430" rx="30" fill="#d8403a" stroke="#0b0d12" stroke-width="12"/>
      <rect x="-150" y="-430" width="300" height="430" rx="30" fill="url(#sheen)"/>
    </g>
    <!-- blue (pitch 3, right) -->
    <g transform="rotate(21)">
      <rect x="-150" y="-430" width="300" height="430" rx="30" fill="#3d7fd6" stroke="#0b0d12" stroke-width="12"/>
      <rect x="-150" y="-430" width="300" height="430" rx="30" fill="url(#sheen)"/>
    </g>
    <!-- yellow (pitch 2, centre, on top) -->
    <g>
      <rect x="-158" y="-452" width="316" height="452" rx="32" fill="#e6b73e" stroke="#0b0d12" stroke-width="12"/>
      <rect x="-158" y="-452" width="316" height="452" rx="32" fill="url(#sheen)"/>
      <!-- hex emblem (the app's ⬢ mark) embossed on the centre card -->
      <path d="M0 -312 L93 -258 L93 -150 L0 -96 L-93 -150 L-93 -258 Z"
            fill="#0b0d12" fill-opacity="0.30"/>
    </g>
  </g>
</svg>
