name: Release

# Build installers for macOS / Windows / Linux. On a version tag, publish a
# GitHub Release with the signed bundles + the updater manifest (latest.json),
# which the in-app updater reads from `releases/latest/download/latest.json`.
# A manual run just builds + uploads workflow artifacts (no release).
#
# Requires repo secrets TAURI_SIGNING_PRIVATE_KEY (+ ..._PASSWORD) so the
# updater artifacts can be signed. (OS code signing / notarization is separate
# and not done here — first launch still hits Gatekeeper / SmartScreen.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Run all JavaScript actions on Node 24 (Node 20 is being deprecated on the
# runners). Covers every action below, not just the ones with newer majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev build-essential curl wget file libssl-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The key was generated without a password, so this is intentionally
          # empty (GitHub can't store an empty secret).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # On a tag push, create/append to a release of that tag (with the
          # signed bundles + latest.json). On manual runs, tagName is empty and
          # tauri-action just builds — artifacts are captured by the step below.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "FaB Tracker ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundles (manual runs / debugging)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: fabtracker-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
