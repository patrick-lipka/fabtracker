name: Build release artifacts

# Build installers for macOS / Windows / Linux. Triggered by a version tag
# (e.g. `git tag v0.1.0 && git push --tags`) or run manually. Bundles are
# uploaded as workflow artifacts to download and distribute (binaries are
# unsigned — macOS Gatekeeper / Windows SmartScreen will warn until signed).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Run all JavaScript actions on Node 24 (Node 20 is being deprecated on the
# runners). Covers every action below, not just the ones with newer majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libxdo-dev \
            libayatana-appindicator3-dev build-essential curl wget file libssl-dev

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: fabtracker-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
